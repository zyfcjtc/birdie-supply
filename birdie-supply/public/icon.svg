<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="featherGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="corkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#059669"/>

  <!-- Shuttlecock centered -->
  <g transform="translate(256, 240) scale(4.5)">
    <!-- Feather skirt -->
    <path d="M0 12 L-24 -38 Q-20 -44 -12 -46 L0 12Z" fill="#6ee7b7" opacity="0.7"/>
    <path d="M0 12 L-16 -42 Q-10 -46 -4 -46 L0 12Z" fill="#a7f3d0" opacity="0.8"/>
    <path d="M0 12 L-4 -44 Q2 -46 6 -44 L0 12Z" fill="#d1fae5" opacity="0.9"/>
    <path d="M0 12 L6 -44 Q12 -42 16 -38 L0 12Z" fill="#a7f3d0" opacity="0.8"/>
    <path d="M0 12 L16 -38 Q20 -32 22 -28 L0 12Z" fill="#6ee7b7" opacity="0.7"/>
    <!-- Detail lines -->
    <line x1="0" y1="12" x2="-18" y2="-40" stroke="white" stroke-width="0.4" opacity="0.3"/>
    <line x1="0" y1="12" x2="-10" y2="-44" stroke="white" stroke-width="0.4" opacity="0.3"/>
    <line x1="0" y1="12" x2="0" y2="-45" stroke="white" stroke-width="0.4" opacity="0.3"/>
    <line x1="0" y1="12" x2="10" y2="-44" stroke="white" stroke-width="0.4" opacity="0.3"/>
    <line x1="0" y1="12" x2="18" y2="-36" stroke="white" stroke-width="0.4" opacity="0.3"/>
    <!-- Cork -->
    <ellipse cx="0" cy="18" rx="10" ry="7" fill="url(#corkGrad)"/>
    <ellipse cx="0" cy="16" rx="10" ry="6" fill="#fcd34d"/>
    <!-- Cork dots -->
    <circle cx="-4" cy="16" r="0.8" fill="#d97706" opacity="0.3"/>
    <circle cx="0" cy="15" r="0.8" fill="#d97706" opacity="0.3"/>
    <circle cx="4" cy="17" r="0.8" fill="#d97706" opacity="0.3"/>
    <circle cx="-2" cy="18" r="0.8" fill="#d97706" opacity="0.3"/>
    <circle cx="2" cy="16" r="0.8" fill="#d97706" opacity="0.3"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="featherGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="corkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Shuttlecock icon -->
  <g transform="translate(16, 6)" filter="url(#shadow)">
    <!-- Feather skirt -->
    <path d="M28 48 L4 10 Q8 4 16 2 L28 48Z" fill="#6ee7b7" opacity="0.7"/>
    <path d="M28 48 L12 6 Q18 2 24 2 L28 48Z" fill="#34d399" opacity="0.8"/>
    <path d="M28 48 L24 4 Q30 2 34 4 L28 48Z" fill="url(#featherGrad)" opacity="0.9"/>
    <path d="M28 48 L34 4 Q40 6 44 10 L28 48Z" fill="#34d399" opacity="0.8"/>
    <path d="M28 48 L44 10 Q48 16 50 20 L28 48Z" fill="#6ee7b7" opacity="0.7"/>
    <!-- Feather detail lines -->
    <line x1="28" y1="48" x2="10" y2="8" stroke="#047857" stroke-width="0.5" opacity="0.3"/>
    <line x1="28" y1="48" x2="18" y2="4" stroke="#047857" stroke-width="0.5" opacity="0.3"/>
    <line x1="28" y1="48" x2="28" y2="3" stroke="#047857" stroke-width="0.5" opacity="0.3"/>
    <line x1="28" y1="48" x2="38" y2="4" stroke="#047857" stroke-width="0.5" opacity="0.3"/>
    <line x1="28" y1="48" x2="46" y2="12" stroke="#047857" stroke-width="0.5" opacity="0.3"/>
    <!-- Cork -->
    <ellipse cx="28" cy="54" rx="10" ry="7" fill="url(#corkGrad)"/>
    <ellipse cx="28" cy="52" rx="10" ry="6" fill="#fcd34d"/>
    <!-- Cork texture dots -->
    <circle cx="24" cy="52" r="0.8" fill="#d97706" opacity="0.3"/>
    <circle cx="28" cy="51" r="0.8" fill="#d97706" opacity="0.3"/>
    <circle cx="32" cy="53" r="0.8" fill="#d97706" opacity="0.3"/>
    <circle cx="26" cy="54" r="0.8" fill="#d97706" opacity="0.3"/>
    <circle cx="30" cy="52" r="0.8" fill="#d97706" opacity="0.3"/>
  </g>

  <!-- TRT text -->
  <text x="78" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#059669" letter-spacing="3">TRT</text>

  <!-- Birdies text -->
  <text x="78" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#111827">Birdies</text>

  <!-- Chinese subtitle -->
  <text x="175" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">羽毛球补给站</text>
</svg>
